<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Our Love Journey</title>
	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
	<div class="falling-hearts" id="falling-hearts"></div>

	<div class="card">
		<h1 class="title">Been Together</h1>

		<div class="couple-container">
			<img src="https://i.pinimg.com/736x/21/20/b0/2120b058cb9946e36306778243eadae5.jpg" alt="Boy" class="avatar">

			<div class="heart-beat">❤️</div>

			<img src="https://i.pinimg.com/736x/76/4d/5f/764d5f47050d268d8339c9f0bd5f49d6.jpg" alt="Girl" class="avatar">
		</div>

		<div class="names">
			<span>Đức</span>
			<span class="and">&</span>
			<span>Linh</span>
		</div>

		<div class="counter-box">
			<div class="days-count" id="days">0</div>
			<div class="days-label">Ngày</div>
		</div>

		<div class="start-date">Bắt đầu từ: <span id="startDateDisplay">10/02/2026</span></div>
	</div>

	<script src="script.js"></script>
</body>
</html>
